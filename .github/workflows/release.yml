name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Generate release notes
        id: release-notes
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..${GITHUB_REF_NAME}" --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi

          FEAT=""
          FIX=""
          OTHER=""

          if [ -n "$COMMITS" ]; then
            while IFS= read -r line; do
              if echo "$line" | grep -qiE "^(feat|feature)(\\(.+\\))?: "; then
                MSG=$(echo "$line" | sed -E 's/^(feat|feature)(\\(.+\\))?: //I')
                FEAT="${FEAT}- ${MSG}"$'\n'
              elif echo "$line" | grep -qiE "^(fix|bugfix)(\\(.+\\))?: "; then
                MSG=$(echo "$line" | sed -E 's/^(fix|bugfix)(\\(.+\\))?: //I')
                FIX="${FIX}- ${MSG}"$'\n'
              else
                OTHER="${OTHER}- ${line}"$'\n'
              fi
            done <<< "$COMMITS"
          fi

          BODY=""
          if [ -n "$FEAT" ]; then
            BODY="${BODY}## ūüöÄ śĖįÁČĻśÄß"$'\n'$'\n'"${FEAT}"$'\n'
          fi
          if [ -n "$FIX" ]; then
            BODY="${BODY}## ūüźõ Áľļťô∑šŅģŚ§ć"$'\n'$'\n'"${FIX}"$'\n'
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}## ūüďč ŚÖ∂šĽĖŚŹėśõī"$'\n'$'\n'"${OTHER}"
          fi

          DELIM="RELNOTES_$(date +%s)"
          {
            echo "body<<${DELIM}"
            printf '%s\n' "${BODY}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Doit ${{ github.ref_name }}"
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Generate changelog
        if: matrix.platform == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: node scripts/generate-changelog.js

      - name: Commit changelog
        if: matrix.platform == 'ubuntu-latest' && matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
          else
            git commit -m "docs: śõīśĖį Changelog for ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi